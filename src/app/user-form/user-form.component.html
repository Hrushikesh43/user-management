<!-- user-form.component.html -->
<div>
  <h2>Create User</h2>
</div>

<form (ngSubmit)="createUser()">
  <div class="form-row">
    <div class="form-group col-md-4">
      <label for="username">Username:</label>
      <input type="text" id="username" [(ngModel)]="newUser.username" name="username" required maxlength="20">
      <small *ngIf="!userNamePatternMatch(newUser.username)" class="user-error-message">
        <span>
          Not a valid username (numbers and special characters are not allowed)!
        </span>
      </small>
      
    </div>

    <div class="form-group col-md-4">
      <label for="phone">Phone:</label>
      <input type="text" id="phone" [(ngModel)]="newUser.phone" name="phone" required>
    </div>
    <div class="form-group col-md-4">
      <label for="city">City:</label>
      <input type="text" id="city" [(ngModel)]="newUser.city" name="city" required>
    </div>
  </div>
  <button class="btn btn-primary" type="submit" [disabled]="!userNamePatternMatch(newUser.username)">Create</button>
</form>
