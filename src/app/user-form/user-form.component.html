<!-- user-form.component.html -->
<div class="container">
  <h2>Create User</h2>


  <form (ngSubmit)="createUser()" [formGroup]="userForm">

    <div class="form-group">
      <div class="col-6">
        <label for="username">Username :</label>
        <input type="text" id="username" class="form-control" formControlName="username" required maxlength="20">
        <small *ngIf="user && user.errors?.required && user.touched">
          <span>
            *Username is required
          </span>
        </small>
        <small *ngIf="user && user.errors?.pattern && user.touched">
          <span>
            *Username should not contain any numbers and special character
          </span>
        </small>
      </div>

      <br>

      <div class="col-6">
        <label for="phone">Phone :</label>
        <input type="text" id="phone" class="form-control" formControlName="phone" required>
        <small *ngIf="phone && phone.errors?.required && phone.touched">
          <span>
            *Phone number is required
          </span>
        </small>
        <small *ngIf="phone && phone.errors?.pattern && phone.touched">
          <span>
            *Only numbers are allowed
          </span>
        </small>
        <small *ngIf="phone && phone.errors?.maxlength&& phone.touched">
          <span>
            *Only 10 digit number is allowed
          </span>
        </small>
      </div>

      <br>
      <div class="row">
        <div class="col-3">
          <label for="city">City :</label>
          <br>
          <select id="city" formControlName="city" required="">
            <option value="">Choose a city</option>
            <option *ngFor="let city of city" [value]="city">{{ city }}</option>
          </select>
        </div>
        <br>
        <div class="col-3">
          <div class="label">Food Prefernces :
            <ng-select formControlName="foodControl" [multiple]="true" placeholder="">
              <ng-option *ngFor="let food of foodlist" [value]="food.name">
                {{food.name}}</ng-option>
            </ng-select>
          </div>
        </div>
      </div>

      <br>

      <p>Gender :</p>
      <div *ngFor="let gender of genders" class="form-check">
        <label for="gender" class="form-check-label">
          <input type="radio" class="form-check-input" [value]="gender" formControlName="gender" required>
          {{gender}}</label>
      </div>

      <div class="row">
        <div class="col-2">
          <button class="btn btn-primary" type="submit" [disabled]="userForm.invalid">Create</button>
        </div>
        <div class="col-2">
          <button class="btn btn-primary" type="button" routerLink="/user-grid">Cancel</button>
        </div>
      </div>
    </div>
  </form>

</div>
