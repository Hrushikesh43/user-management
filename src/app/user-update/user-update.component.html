<!-- user-form.component.html -->
<div>
    <h2>Update User</h2>
  </div>
  
  <form (ngSubmit)="updateUserDetail()">
    <div class="form-row">
    <div class="form-group col-md-4">
      <label for="username">Username:</label>
      <input type="text" id="username" [(ngModel)]="updateUser.username" name="username" >
    </div>
    <div class="form-group col-md-4">
      <label for="phone">Phone:</label>
      <input type="text" id="phone" [(ngModel)]="updateUser.phone" name="phone" >
    </div>
    <div class="form-group col-md-4">
      <label for="city">City:</label>
      <input type="text" id="city" [(ngModel)]="updateUser.city" name="city" >
    </div>
  </div>
    <button type="submit">Update</button>
  </form>
