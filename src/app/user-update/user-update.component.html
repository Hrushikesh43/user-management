<!-- user-form.component.html -->
<div>
  <h2>Update User</h2>
</div>

<form (ngSubmit)="updateUserDetail()">
  <div class="form-row">
    <div class="form-group col-md-4">
      <label for="username">Username:</label>
      <input type="text" id="username" [(ngModel)]="updateUser.username" name="username">
    </div>
    <div class="form-group col-md-4">
      <label for="phone">Phone:</label>
      <input type="text" id="phone" [(ngModel)]="updateUser.phone" name="phone">
    </div>
    <div class="form-group col-md-4">
      <label for="city">City:</label>
      
      <!-- city.component.html -->
<select name="city" id="city" [(ngModel)]="updateUser.city">
  <option value="">Choose a city</option>
  <option *ngFor="let city of cities" [value]="city">{{ city }}</option>
</select>

    </div>
    
    <div class="form-group col-md-4">
      <label for="gender">Gender:</label>
      
        <!-- Male radio button -->
        <input type="radio" id="male" [(ngModel)]="updateUser.gender" name="gender" value="male">
        <label for="male">Male</label>
    
        <!-- Female radio button -->
        <input type="radio" id="female" [(ngModel)]="updateUser.gender" name="gender" value="female">
        <label for="female">Female</label>
      
    </div>
    <div class="form-group col-md-4">
    <div class="label">Food Prefernces</div>
    <ng-select class="w-20"  [multiple]="true" [(ngModel)]="updateUser.foodControl"
    [ngModelOptions]="{standalone: true}"
    >
     <ng-option *ngFor="let food of foodUpdateList" [value]="food.name">
       {{food.name}}</ng-option>
    </ng-select>
  </div>
  </div>
  <button type="submit">Update</button>
</form>
